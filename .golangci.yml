version: "2"
run:
  tests: true
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      # Conventionally fire-and-forget calls: a deferred tx rollback (the happy path already
      # committed) and resource Close()/std-stream writes. Ignoring their error is idiomatic.
      exclude-functions:
        - (github.com/jackc/pgx/v5.Tx).Rollback
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*os.File).WriteString
    # NOTE: govet `shadow` intentionally NOT enabled — `if err := f(); err != nil` style shadows
    # are idiomatic Go and produce only noise here.
  exclusions:
    generated: lax
    rules:
      - linters:
          - gosec
        text: G115
      # Dev/CLI utilities (the tools module's commands) — not production services; gosec's
      # file-path / unchecked-error scrutiny is noise on throwaway migration/seed/tracker mains.
      - linters:
          - gosec
          - errcheck
        path: cmd/(migrate|devpg|tracker|seed)/
      - linters:
          - errcheck
          - gosec
          - govet
        path: _test\.go
      - linters:
          - errcheck
          - gosec
          - ineffassign
          - staticcheck
          - unused
        path: (\.pb\.go|_gen\.go|/generated/)
      - linters:
          - errcheck
          - gosec
          - staticcheck
          - unused
        path: db/(sqlc|generated)/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/aizorix/platform
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
