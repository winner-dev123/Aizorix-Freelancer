# Local development backing services. Production uses managed AWS equivalents
# (RDS, ElastiCache, MSK, S3, OpenSearch) provisioned via infra/terraform.
name: aizorix-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aizorix
      POSTGRES_PASSWORD: aizorix_dev
      POSTGRES_DB: aizorix
    command: ["postgres", "-c", "max_connections=300", "-c", "shared_buffers=256MB"]
    ports: ["5432:5432"]
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aizorix"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes:
      - ./.data/redis:/data

  # Redpanda is Kafka API-compatible and lightweight for local dev.
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    volumes:
      - ./.data/redpanda:/var/lib/redpanda/data

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.data/minio:/data

  # Creates the screenshots bucket on startup.
  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/aizorix-screenshots;
      /usr/bin/mc version enable local/aizorix-screenshots;
      exit 0;
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes:
      - ./.data/elasticsearch:/usr/share/elasticsearch/data

  # OpenTelemetry collector -> (Tempo/Jaeger) optional in dev
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
