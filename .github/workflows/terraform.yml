# Terraform CI/CD for infra/terraform.
#
#   PR / push to main -> fmt check, validate, plan (offline; a real plan only when AWS is configured)
#   main push w/ AWS  -> apply, gated by the `production-infra` environment (required reviewers)
#
# AWS auth is OIDC -> IAM role. State lives in the S3 backend configured in versions.tf; the
# concrete bucket/key/table are passed via -backend-config secrets.
#
# NOTE on GitHub Environments/Deployments: the fmt/validate/plan job is plain CI and deliberately
# has NO `environment:` — otherwise GitHub records every CI run (including failures) as a
# "deployment to staging-infra", which is misleading. Only a genuine `apply` targets an
# environment, so the Deployments tab reflects real infra changes, not CI.

name: terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"

concurrency:
  # Never run two applies against the same state at once.
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: write # plan comment

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: us-east-1
  WORKDIR: infra/terraform

jobs:
  plan:
    name: fmt • validate • plan
    runs-on: ubuntu-latest
    # No `environment:` — this job is offline CI (fmt/validate, plus a read-only plan when AWS is
    # configured). It must not create a deployment record; the apply job below owns that.
    outputs:
      has_aws: ${{ steps.has-aws.outputs.has_aws }}
    env:
      # Terraform state lives in S3 + needs AWS OIDC. fmt/validate run offline regardless; the
      # AWS-backed init/plan only run when the role is configured, so this stays green pre-AWS.
      HAS_AWS: ${{ secrets.AWS_TERRAFORM_ROLE_ARN != '' }}
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4

      # Surface AWS-secret presence as a job output so the apply job (whose `if` cannot read
      # secrets directly) can gate on it.
      - name: Detect AWS configuration
        id: has-aws
        run: echo "has_aws=${{ secrets.AWS_TERRAFORM_ROLE_ARN != '' }}" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # fmt + validate need no cloud credentials (offline provider init).
      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform validate
        run: |
          terraform init -backend=false -input=false
          terraform validate -no-color

      - name: Configure AWS credentials (OIDC)
        if: env.HAS_AWS == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform plan (with state backend)
        id: plan
        if: env.HAS_AWS == 'true'
        run: |
          terraform init -reconfigure -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"
          terraform plan -no-color -input=false -out=tfplan | tee plan.txt
          { echo "summary<<EOF"; tail -c 60000 plan.txt; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        if: env.HAS_AWS == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `#### Terraform Plan 📖\n\`\`\`\n${{ steps.plan.outputs.summary }}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const mark = '#### Terraform Plan 📖';
            const existing = comments.find(c => c.body.startsWith(mark));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

  apply:
    name: apply
    needs: [plan]
    # Only on a direct push to main AND only when AWS is actually configured. Gating the whole job
    # (not just its steps) means a repo without AWS secrets never spins up — and never records a
    # bogus "production-infra" deployment. The AWS-presence flag comes from the plan job's output
    # because a job-level `if` cannot read `secrets` directly.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.plan.outputs.has_aws == 'true'
    runs-on: ubuntu-latest
    environment: production-infra # required reviewers + wait timer enforce the gate
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform apply
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"
          terraform apply -auto-approve -input=false
