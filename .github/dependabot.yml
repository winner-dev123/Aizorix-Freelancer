# Dependabot keeps dependencies and the supply chain current across every
# ecosystem in the monorepo. Grouped minor/patch PRs reduce noise; majors come
# as individual PRs so they can be reviewed deliberately.

version: 2

updates:
  # ── GitHub Actions (all workflows) ──────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, ci]
    groups:
      actions:
        patterns: ["*"]
        update-types: [minor, patch]

  # ── Go modules — one entry per service module + shared pkg ──────────
  - package-ecosystem: gomod
    directory: "/services/pkg"
    schedule: { interval: weekly, day: monday }
    labels: [dependencies, go]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: "/services/auth"
    schedule: { interval: weekly, day: monday }
    labels: [dependencies, go]
    groups:
      go-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: "/services/timetracking"
    schedule: { interval: weekly, day: monday }
    labels: [dependencies, go]
    groups:
      go-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: "/services/screenshot"
    schedule: { interval: weekly, day: monday }
    labels: [dependencies, go]
    groups:
      go-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  # ── Web frontend (pnpm) ─────────────────────────────────────────────
  - package-ecosystem: npm
    directory: "/web"
    schedule: { interval: weekly, day: monday }
    labels: [dependencies, frontend]
    open-pull-requests-limit: 10
    groups:
      react:
        patterns: ["react", "react-dom", "next", "eslint-config-next"]
      tooling:
        patterns: ["eslint*", "prettier*", "typescript", "@types/*"]
      minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  # ── Desktop tracker (Rust / Cargo) ──────────────────────────────────
  - package-ecosystem: cargo
    directory: "/desktop-tracker/src-tauri"
    schedule: { interval: weekly, day: monday }
    labels: [dependencies, tracker]
    groups:
      cargo-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  # ── Container base images (Dockerfiles) ─────────────────────────────
  - package-ecosystem: docker
    directory: "/services/auth"
    schedule: { interval: weekly, day: monday }
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: "/services/timetracking"
    schedule: { interval: weekly, day: monday }
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: "/services/screenshot"
    schedule: { interval: weekly, day: monday }
    labels: [dependencies, docker]
