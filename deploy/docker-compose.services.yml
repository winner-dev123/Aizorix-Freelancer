  #   image: aizorix/messaging:dev
  #   environment: *common-env
  #   ports: ["8092:8080"]
  #   healthcheck: *healthz
  # notification:
  #   build: { context: .., dockerfile: services/notification/Dockerfile }
  #   image: aizorix/notification:dev
  #   environment: *common-env
  #   ports: ["8093:8080"]
  #   healthcheck: *healthz
  # search:
  #   build: { context: .., dockerfile: services/search/Dockerfile }
  #   image: aizorix/search:dev
  #   environment: *common-env
  #   ports: ["8094:8080"]
  #   healthcheck: *healthz
  # fraud:
  #   build: { context: .., dockerfile: services/fraud/Dockerfile }
  #   image: aizorix/fraud:dev
