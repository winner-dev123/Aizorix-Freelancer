  #   healthcheck: *healthz

# Attach to the network created by the ROOT docker-compose.yml (name: aizorix-dev).
# Compose names the default network "<project>_default" => "aizorix-dev_default".
# If your infra project name differs, override AIZORIX_INFRA_NETWORK or edit below.
networks:
  default:
    name: aizorix-dev_default
    external: true
