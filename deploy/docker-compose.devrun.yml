# Standalone, isolated infra for a local end-to-end run. Uses HIGH host ports so it never
# collides with other stacks already running on this host (5432/6379 are often taken).
#   docker compose -f deploy/docker-compose.devrun.yml up -d
#   DATABASE_URL=postgres://aizorix:aizorix_dev@localhost:55432/aizorix?sslmode=disable
#   REDIS_ADDR=localhost:56379
name: aizorix-run

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aizorix
      POSTGRES_PASSWORD: aizorix_dev
      POSTGRES_DB: aizorix
    ports: ["55432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aizorix"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports: ["56379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "59000:9000"
      - "59001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/aizorix-screenshots;
      /usr/bin/mc version enable local/aizorix-screenshots;
      echo 'bucket ready'; exit 0;
      "

  # Kafka-compatible bus. The OUTSIDE listener is advertised as localhost:59092 so the
  # host-run relay + consumers connect on that port.
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=INTERNAL://0.0.0.0:9092,OUTSIDE://0.0.0.0:59092
      - --advertise-kafka-addr=INTERNAL://redpanda:9092,OUTSIDE://localhost:59092
    ports:
      - "59092:59092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20
