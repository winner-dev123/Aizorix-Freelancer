<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aizorix Tracker</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
      body { margin: 0; padding: 16px; }
      h1 { font-size: 18px; }
      .row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
      input, button, select { padding: 8px; font-size: 14px; }
      button { cursor: pointer; }
      .status { padding: 8px; border-radius: 6px; background: #0001; }
      .disclosure { font-size: 12px; color: #666; margin-top: 12px; }
      .pill { display:inline-block; padding:2px 8px; border-radius:999px; background:#2563eb; color:#fff; font-size:12px; }
    </style>
  </head>
  <body>
    <h1>Aizorix Tracker</h1>
    <div id="app">
      <section id="login-view">
        <div class="row"><input id="email" type="email" placeholder="Email" /></div>
        <div class="row"><input id="password" type="password" placeholder="Password" /></div>
        <div class="row"><button id="login-btn">Sign in</button></div>
      </section>

      <section id="track-view" hidden>
        <div class="row">
          <label>Contract</label>
          <select id="contract-select"></select>
        </div>
        <div class="row">
          <button id="start-btn">Start tracking</button>
          <button id="stop-btn" hidden>Stop tracking</button>
        </div>
        <div class="status" id="status">Idle</div>
        <p class="disclosure">
          While tracking, this app captures a screenshot every 15 minutes and measures input
          activity (counts only — never which keys you press). You consented to this monitoring
          when you accepted the contract. You can stop at any time.
        </p>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
