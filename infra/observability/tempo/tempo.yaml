# Tempo — distributed tracing backend. Receives OTLP from the OTel collector,
# stores traces (filesystem in dev, S3 in prod), and generates service-graph +
# span RED metrics that it remote-writes to Prometheus (the metrics_generator).

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 336h # 14 days of traces

# metrics_generator turns spans into RED metrics + a service graph and
# remote-writes them to Prometheus. This powers the Tempo service-map and the
# traces-to-metrics links configured in the Grafana datasource.
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: aizorix-eks
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
    # Production backend (uncomment for EKS):
    # backend: s3
    # s3:
    #   bucket: aizorix-tempo-traces
    #   region: us-east-1
    #   endpoint: s3.us-east-1.amazonaws.com

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
