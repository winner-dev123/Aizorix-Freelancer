# Alertmanager routing.
#
#   severity=page   -> PagerDuty (24/7) + Slack #alerts-critical
#   severity=ticket -> Slack #alerts (business hours)
#
# Secrets (PagerDuty routing keys, Slack webhook URL) are injected from the
# alertmanager-secrets Kubernetes Secret via env-substitution at render time;
# placeholders below use ${...}. Do NOT commit real keys.

global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_API_URL}"
  pagerduty_url: https://events.pagerduty.com/v2/enqueue

# Reusable notification message templates.
templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  receiver: slack-tickets # default
  group_by: ["alertname", "service", "component"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Financial-integrity alerts always page, no grouping delay.
    - matchers: [component="escrow"]
      receiver: pagerduty-payments
      group_wait: 0s
      continue: true # also mirror to Slack critical
    - matchers: [component="escrow"]
      receiver: slack-critical

    # Everything paging goes to PagerDuty + Slack critical.
    - matchers: [severity="page"]
      receiver: pagerduty-primary
      continue: true
    - matchers: [severity="page"]
      receiver: slack-critical

    # Tickets to Slack only.
    - matchers: [severity="ticket"]
      receiver: slack-tickets

# Suppress noise: if a whole target/cluster is down, don't also page for the
# derived SLO/latency alerts on that same service.
inhibit_rules:
  - source_matchers: [alertname="TargetDown"]
    target_matchers: [severity=~"page|ticket"]
    equal: ["service"]

  - source_matchers: [alertname="PodCrashLooping"]
    target_matchers: [alertname=~"HighErrorRate.*|P99LatencySLOBreach"]
    equal: ["service"]

  # A critical Kafka lag page inhibits the lower "ticket" lag alert on the same group.
  - source_matchers: [alertname="KafkaConsumerLagCritical"]
    target_matchers: [alertname="KafkaConsumerLagHigh"]
    equal: ["consumergroup", "topic"]

  # A page inhibits the matching ticket-level alert for the same service.
  - source_matchers: [severity="page"]
    target_matchers: [severity="ticket"]
    equal: ["service"]

receivers:
  - name: pagerduty-primary
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        severity: critical
        description: "{{ .CommonAnnotations.summary }}"
        details:
          firing: "{{ .Alerts.Firing | len }}"
          service: "{{ .CommonLabels.service }}"
          slo: "{{ .CommonLabels.slo }}"
          runbook: "{{ .CommonAnnotations.runbook_url }}"

  - name: pagerduty-payments
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_PAYMENTS_ROUTING_KEY}"
        severity: critical
        description: "[PAYMENTS] {{ .CommonAnnotations.summary }}"
        details:
          runbook: "{{ .CommonAnnotations.runbook_url }}"

  - name: slack-critical
    slack_configs:
      - channel: "#alerts-critical"
        send_resolved: true
        title: ":rotating_light: {{ .CommonAnnotations.summary }}"
        text: |
          {{ range .Alerts -}}
          *{{ .Labels.alertname }}* ({{ .Labels.severity }})
          {{ .Annotations.description }}
          {{ if .Annotations.runbook_url }}<{{ .Annotations.runbook_url }}|Runbook>{{ end }}
          {{ end }}

  - name: slack-tickets
    slack_configs:
      - channel: "#alerts"
        send_resolved: true
        title: "{{ .CommonAnnotations.summary }}"
        text: |
          {{ range .Alerts -}}
          *{{ .Labels.alertname }}* — {{ .Annotations.description }}
          {{ end }}
