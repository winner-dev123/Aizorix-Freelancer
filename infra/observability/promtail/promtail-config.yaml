# Promtail — ships container stdout (structured JSON / slog) to Loki.
# Services log one JSON object per line with at least: service, env, level, msg,
# time, and (when in a trace) trace_id. We promote service/level to stream
# labels and keep trace_id as structured metadata for trace<->log correlation.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Kubernetes pods ────────────────────────────────────────────────
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    pipeline_stages:
      # Parse the slog JSON envelope.
      - cri: {}
      - json:
          expressions:
            level: level
            msg: msg
            service: service
            env: env
            trace_id: trace_id
            ts: time
      - timestamp:
          source: ts
          format: RFC3339Nano
      # Promote low-cardinality fields to labels.
      - labels:
          level:
          service:
          env:
      # Keep trace_id out of labels (high cardinality) but as structured metadata.
      - structured_metadata:
          trace_id:
      - output:
          source: msg
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace]
        action: keep
        regex: aizorix.*
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        target_label: app
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
      - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
        target_label: __path__
        separator: /
        replacement: /var/log/pods/*$1/*.log

  # ── Local docker-compose containers (dev) ──────────────────────────
  - job_name: docker-local
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            trace_id: trace_id
            ts: time
            msg: msg
      - timestamp:
          source: ts
          format: RFC3339Nano
      - labels:
          level:
          service:
      - structured_metadata:
          trace_id:
      - output:
          source: msg
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
