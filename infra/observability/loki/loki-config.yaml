# Loki — single-binary config suitable for dev (docker-compose) and small EKS.
# Production should run distributed mode with S3 object storage (see storage_config).
# Logs arrive as structured JSON (slog) from container stdout via Promtail.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Schema: TSDB index + (in prod) S3 object store. Switch object_store to `s3`
# and fill storage_config.aws for the EKS deployment.
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks
  # Production object storage (uncomment and parameterize via Terraform/Helm):
  # aws:
  #   s3: s3://us-east-1/aizorix-loki-chunks
  #   region: us-east-1

limits_config:
  retention_period: 720h # 30 days
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_query_series: 5000
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_label_names_per_series: 30
  # High-cardinality labels (trace_id, user_id, etc.) must stay in the log line,
  # not become stream labels — enforce structured metadata instead.
  allow_structured_metadata: true

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
  compaction_interval: 10m

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-tmp
  alertmanager_url: http://alertmanager:9093
  enable_api: true

analytics:
  reporting_enabled: false
