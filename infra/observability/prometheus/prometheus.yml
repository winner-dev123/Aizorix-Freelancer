# Prometheus server config.
#
# In EKS this is rendered by the kube-prometheus-stack / Prometheus Operator and
# most scrape targets come from ServiceMonitors. This static file documents the
# intended scrape topology and works as-is for the docker-compose dev stack.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: aizorix-eks
    region: us-east-1
    # `env` is overridden per environment (staging/production) at deploy time.
    env: production

# Recording + alerting rules.
rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      scheme: http
      timeout: 10s

scrape_configs:
  # ── Prometheus self-monitoring ──────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Aizorix Go services (metrics on :9090/metrics) ──────────────────
  # In dev these are static; in EKS the relabeling below mirrors what the
  # Operator generates from pod annotations.
  - job_name: aizorix-services
    metrics_path: /metrics
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      # Only scrape pods that opt in via annotation.
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels:
          [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        target_label: service
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node

  # ── Static fallback for the docker-compose dev stack ────────────────
  - job_name: aizorix-services-static
    metrics_path: /metrics
    static_configs:
      - targets:
          - "auth:9090"
          - "timetracking:9090"
          - "screenshot:9090"
          - "payment:9090"
          - "escrow:9090"
        labels:
          env: local

  # ── Infra exporters ─────────────────────────────────────────────────
  - job_name: node-exporter
    kubernetes_sd_configs: [{ role: node }]
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.*):10250"
        replacement: "${1}:9100"
        target_label: __address__

  - job_name: kube-state-metrics
    static_configs:
      - targets: ["kube-state-metrics:8080"]

  # kafka_exporter / Strimzi exposes kafka_consumergroup_lag etc.
  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # postgres_exporter exposes pg_stat_* and pg_settings.
  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # OTel collector self-telemetry + Prometheus remote-write/exporter endpoint.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888", "otel-collector:8889"]
