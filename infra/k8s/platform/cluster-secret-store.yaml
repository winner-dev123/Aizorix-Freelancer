# Cluster-wide External Secrets store pointing at AWS Secrets Manager in us-east-1.
# Auth is via the ServiceAccount referenced below, which carries an IRSA annotation for a
# role allowed to read the aizorix-*/*/config secrets. Each ExternalSecret further narrows
# WHICH secret it pulls; the workload pods themselves never get broad SM access.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
