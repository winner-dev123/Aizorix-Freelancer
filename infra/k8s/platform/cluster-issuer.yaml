# cert-manager ClusterIssuer using ACME (Let's Encrypt) with DNS-01 via Route 53. DNS-01
# works for both public edge certs and wildcards, and doesn't require the solver to be
# internet-reachable. The Route 53 access uses cert-manager's IRSA role.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: platform@aizorix.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
            # cert-manager assumes its IRSA role; no static keys.
---
# Staging issuer (higher rate limits, untrusted certs) for non-prod testing.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: platform@aizorix.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
