# Syncs AWS Secrets Manager -> a k8s Secret consumed by the auth Deployment's envFrom.
# Requires the External Secrets Operator + a ClusterSecretStore named "aws-secretsmanager"
# (see infra/k8s/platform). The store authenticates via the auth IRSA role, so auth can read
# ONLY its own secret (IAM-enforced in modules/iam).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-config
  labels:
    app: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: auth-config # k8s Secret name the Deployment mounts via envFrom
    creationPolicy: Owner
  # dataFrom extracts every key in the JSON secret into the target Secret as env vars.
  dataFrom:
    - extract:
        # SECRET_PREFIX (aizorix-production / aizorix-staging) is templated by the env overlay.
        key: SECRET_PREFIX/auth/config
