# screenshot service overlay. Higher memory (decrypt-on-read + image handling), its own IRSA
# role (scoped S3 + screenshots CMK), and a larger /tmp scratch space for streaming decrypts.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aizorix

resources:
  - ../../base
  - externalsecret.yaml

# Metadata-only label; selector flip is handled by the explicit patches below.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: screenshot

patches:
  - target:
      kind: Deployment
      name: service
    patch: |
      - op: replace
        path: /metadata/name
        value: screenshot
      - op: replace
        path: /metadata/labels/app
        value: screenshot
      - op: replace
        path: /spec/selector/matchLabels/app
        value: screenshot
      - op: replace
        path: /spec/template/metadata/labels/app
        value: screenshot
      - op: replace
        path: /spec/template/spec/serviceAccountName
        value: screenshot
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: REGISTRY/aizorix/screenshot:latest
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: screenshot-config
      - op: replace
        path: /spec/replicas
        value: 3
      # Image decrypt/transform is memory-heavy; bump requests + limits.
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
      # Larger writable scratch dir (memory-backed) for streaming decrypts; rootfs stays RO.
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
  - target:
      kind: Service
      name: service
    patch: |
      - op: replace
        path: /metadata/name
        value: screenshot
      - op: replace
        path: /metadata/labels/app
        value: screenshot
      - op: replace
        path: /spec/selector/app
        value: screenshot
  - target:
      kind: ServiceAccount
      name: service
    patch: |
      - op: replace
        path: /metadata/name
        value: screenshot
      - op: replace
        path: /metadata/annotations/eks.amazonaws.com~1role-arn
        value: arn:aws:iam::ACCOUNT_ID:role/aizorix-ENV-irsa-screenshot
  - target:
      kind: HorizontalPodAutoscaler
      name: service
    patch: |
      - op: replace
        path: /metadata/name
        value: screenshot
      - op: replace
        path: /spec/scaleTargetRef/name
        value: screenshot
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 25
      - op: replace
        path: /metadata/labels/app
        value: screenshot
  - target:
      kind: PodDisruptionBudget
      name: service
    patch: |
      - op: replace
        path: /metadata/name
        value: screenshot
      - op: replace
        path: /spec/selector/matchLabels/app
        value: screenshot
      - op: replace
        path: /metadata/labels/app
        value: screenshot
  - target:
      kind: NetworkPolicy
      name: service
    patch: |
      - op: replace
        path: /metadata/name
        value: screenshot
      - op: replace
        path: /spec/podSelector/matchLabels/app
        value: screenshot
      - op: replace
        path: /metadata/labels/app
        value: screenshot
