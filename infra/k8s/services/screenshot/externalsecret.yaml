apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: screenshot-config
  labels:
    app: screenshot
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: screenshot-config
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: SECRET_PREFIX/screenshot/config
