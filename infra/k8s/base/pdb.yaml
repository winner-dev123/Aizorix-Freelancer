# PodDisruptionBudget keeps at least one replica serving during voluntary disruptions
# (node drains, cluster upgrades, Karpenter consolidation). minAvailable is a percentage so
# it scales with the HPA. Always pairs with maxUnavailable:0 in the Deployment for safety.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: service
  labels:
    app: service
spec:
  minAvailable: 50%
  selector:
    matchLabels:
      app: service
