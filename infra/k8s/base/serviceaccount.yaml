# IRSA-enabled ServiceAccount. The eks.amazonaws.com/role-arn annotation is filled in per
# service by its overlay (it must match the role created in modules/iam: aizorix-<env>-irsa-<svc>).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: service # patched per service by overlay
  annotations:
    eks.amazonaws.com/role-arn: "REPLACED_BY_OVERLAY"
    # Use a regional STS endpoint for lower latency + resilience.
    eks.amazonaws.com/sts-regional-endpoints: "true"
automountServiceAccountToken: true
